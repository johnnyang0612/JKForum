<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gemTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="gemBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
  </defs>
  <!-- 寶石上半切面 -->
  <polygon points="32,8 16,24 48,24" fill="url(#gemTop)" stroke="#0c4a6e" stroke-width="1.5"/>
  <!-- 中間切面（亮）-->
  <polygon points="16,24 24,24 32,8" fill="#bae6fd" opacity="0.8"/>
  <!-- 寶石下半（左切面）-->
  <polygon points="16,24 32,56 32,24" fill="url(#gemBot)" stroke="#0c4a6e" stroke-width="1.5"/>
  <!-- 寶石下半（右切面 — 較亮）-->
  <polygon points="48,24 32,56 32,24" fill="#0ea5e9" stroke="#0c4a6e" stroke-width="1.5" opacity="0.9"/>
  <!-- 高光 -->
  <polygon points="20,22 28,22 24,12" fill="#e0f2fe" opacity="0.8"/>
  <polygon points="33,26 38,32 33,38" fill="#bae6fd" opacity="0.5"/>
  <!-- 閃光 -->
  <circle cx="50" cy="14" r="1.5" fill="#fff"/>
  <circle cx="55" cy="22" r="1" fill="#fff"/>
  <circle cx="10" cy="40" r="0.8" fill="#fff"/>
</svg>
