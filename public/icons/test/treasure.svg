<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a16207"/>
      <stop offset="100%" stop-color="#713f12"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#854d0e"/>
    </linearGradient>
  </defs>
  <!-- 寶箱底部 -->
  <rect x="8" y="28" width="48" height="28" rx="2" fill="url(#boxGrad)" stroke="#451a03" stroke-width="2"/>
  <!-- 寶箱上蓋（半開）-->
  <path d="M8 28 Q8 18 14 16 L50 16 Q56 18 56 28 Z" fill="url(#lidGrad)" stroke="#451a03" stroke-width="2"/>
  <!-- 金條 -->
  <rect x="14" y="34" width="36" height="4" fill="#fbbf24" rx="1"/>
  <rect x="16" y="40" width="32" height="3" fill="#fcd34d" rx="1"/>
  <!-- 金幣（上方溢出）-->
  <circle cx="20" cy="22" r="3" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
  <circle cx="32" cy="20" r="3.5" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
  <circle cx="44" cy="22" r="3" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
  <!-- 鎖 -->
  <rect x="29" y="30" width="6" height="6" fill="#52525b" stroke="#1f2937" stroke-width="0.8" rx="1"/>
  <circle cx="32" cy="33" r="0.8" fill="#1f2937"/>
  <!-- 邊角金屬 -->
  <rect x="8" y="50" width="6" height="6" fill="#52525b" stroke="#1f2937" stroke-width="0.5"/>
  <rect x="50" y="50" width="6" height="6" fill="#52525b" stroke="#1f2937" stroke-width="0.5"/>
</svg>
